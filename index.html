<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IRIS.OS | Segurança de Núcleo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #050505; 
            --bg-card: #0c0c0c;
            --iris-cyan: #7cf7ff;
            --iris-purple: #7b6cff;
            --error-red: #ff4b4b;
            --iris-gradient: linear-gradient(135deg, #7cf7ff 0%, #7b6cff 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-main); color: white; overflow: hidden; height: 100dvh; width: 100vw; }

        .login-wrapper { height: 100dvh; width: 100vw; display: flex; align-items: stretch; position: fixed; z-index: 100; }

        /* --- SIDEBAR --- */
        .login-card {
            background: var(--bg-card); 
            padding: 40px 50px; 
            width: 100%; max-width: 450px; 
            display: flex; flex-direction: column; 
            border-right: 1px solid rgba(255,255,255,0.08);
            z-index: 10;
            height: 100dvh;
            justify-content: space-between;
        }

        .logo-section { display: flex; flex-direction: column; align-items: center; text-align: center; margin-top: 20px; }
        .brand-container { display: flex; align-items: center; gap: 2px; margin-bottom: 20px; }
        .mini-logo { width: 40px; height: 40px; overflow: visible; }

        .brand-text { display: flex; align-items: baseline; gap: 2px; }
        .iris-gradient-text { 
            font-size: 38px; font-weight: 900; letter-spacing: -1px; line-height: 1;
            background: var(--iris-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }
        .os-white-text { color: #ffffff; font-size: 18px; font-weight: 400; opacity: 0.8; }

        .system-info h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--iris-cyan); margin-bottom: 8px; }
        .system-info p { font-size: 12px; color: #9aa0b5; }

        /* --- FORMULÁRIO --- */
        .form-container { width: 100%; max-width: 320px; margin: 0 auto; }
        .input-group { margin-bottom: 25px; position: relative; }
        .input-group label { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #9aa0b5; margin-bottom: 8px; letter-spacing: 1.2px; }
        .input-group input { width: 100%; padding: 18px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: white; outline: none; transition: 0.3s; font-size: 16px; }
        .input-group input:focus { border-color: var(--iris-cyan); }

        /* Estilo de Erro nos Inputs */
        .input-error { border-color: var(--error-red) !important; animation: shake 0.3s ease-in-out; }
        .input-error::placeholder { color: var(--error-red) !important; font-weight: 700; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        .btn-login { width: 100%; padding: 18px; font-weight: 900; background: var(--iris-gradient); border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px; color: #000; }

        /* --- FOOTER & HR --- */
        hr {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            margin-top: auto;
            margin-bottom: 20px;
            width: 100%;
        }

        .sidebar-footer { padding-bottom: 40px; text-align: center; }
        .build-info { font-size: 10px; color: #747373; letter-spacing: 5px; text-transform: uppercase; font-weight: 700; }

        /* --- NÚCLEO --- */
        .iris-core-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: var(--bg-main); position: relative; }
        .core-svg { width: 450px; height: 450px; }
        .main-shape { fill: none; stroke: url(#gradAI); stroke-width: 3.5; stroke-linecap: round; filter: drop-shadow(0 0 15px rgba(124, 247, 255, 0.4)); animation: iris-pulse 4s infinite ease-in-out; }
        @keyframes iris-pulse { 0%, 100% { stroke-width: 3.5; opacity: 0.8; } 50% { stroke-width: 5; opacity: 1; } }

        /* --- MODAIS --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.98); z-index: 9999; align-items: center; justify-content: center; }
        .modal-box { background: #0a0a0a; border: 1px solid var(--error-red); padding: 50px 30px; border-radius: 24px; text-align: center; width: 85%; max-width: 400px; position: relative; }
        .btn-modal { width: 100%; background: transparent; border: 1px solid var(--error-red); padding: 16px; border-radius: 12px; color: var(--error-red); font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 20px; }

        @media (max-width: 768px) {
            .login-wrapper { flex-direction: column; height: 100dvh; }
            .not-initialized .iris-core-container { position: absolute; top: 0; left: 0; width: 100%; height: 100dvh; z-index: 200; animation: iris-exit 1s forwards 8s; }
            .initialized .iris-core-container, .not-initialized .iris-core-container.hide-completely { display: none; }
            .login-card { max-width: 100%; height: 100dvh; padding: 20px 25px 0 25px; opacity: 0; animation: login-entry 1s forwards; border-right: none; }
            .initialized .login-card { animation-delay: 0s; opacity: 1; }
            .not-initialized .login-card { animation-delay: 8.5s; }
            .sidebar-footer { padding-bottom: calc(50px + env(safe-area-inset-bottom)); } 
            @keyframes iris-exit { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
            @keyframes login-entry { from { opacity: 0; } to { opacity: 1; } }
        }
    </style>
</head>
<body class="not-initialized">

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-section">
                <div class="brand-container">
                    <svg class="mini-logo" viewBox="-15 -15 130 130">
                        <defs>
                            <linearGradient id="gradAI" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#7cf7ff"/><stop offset="100%" stop-color="#7b6cff"/>
                            </linearGradient>
                        </defs>
                        <g transform="translate(50,50) scale(1.25)">
                            <path d="M -20 -20 Q 0 -40 20 -20 Q 40 0 20 20 Q 0 40 -20 20 Q -40 0 -20 -20" 
                                  fill="none" stroke="url(#gradAI)" stroke-width="5" stroke-linecap="round"/>
                        </g>
                    </svg>
                    <div class="brand-text">
                        <span class="iris-gradient-text">IRIS</span><span class="os-white-text">.os</span>
                    </div>
                </div>
                <div class="system-info">
                    <h2>Segurança do Núcleo</h2>
                    <p>Sincronização biométrica</p>
                </div>
            </div>

            <div class="form-container">
                <form id="loginForm" autocomplete="off" novalidate>
                    <div class="input-group">
                        <label>ID de Usuário</label>
                        <input type="text" id="userInput" placeholder="Nome" required>
                    </div>
                    <div class="input-group">
                        <label>Chave de Acesso</label>
                        <input type="password" id="passInput" placeholder="••••••••" required>
                    </div>
                    <button type="submit" id="authBtn" class="btn-login">Autenticar</button>
                </form>
            </div>

            <div class="footer-group">
                <hr>
                <div class="sidebar-footer">
                    <div class="build-info">STABLE BUILD 1.0.2</div>
                </div>
            </div>
        </div>

        <div id="irisContainer" class="iris-core-container">
            <svg viewBox="-20 -20 140 140" class="core-svg">
                <g transform="translate(50,50)">
                    <path class="main-shape" d="M -20 -20 Q 0 -40 20 -20 Q 40 0 20 20 Q 0 40 -20 20 Q -40 0 -20 -20" />
                </g>
            </svg>
        </div>
    </div>

    <div id="errorModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="color: var(--error-red); margin-bottom: 20px;">Acesso Negado</h3>
            <p style="color: #999; margin-bottom: 10px;">Informações Incorretas! Você não tem permissão para acessar a IRIS!</p>
            <span id="attemptsText" style="display: block; color: var(--error-red); font-size: 12px; font-weight: 900; margin-bottom: 20px;"></span>
            <button class="btn-modal" onclick="closeModals()">Tentar Novamente</button>
        </div>
    </div>

    <script>
    const body = document.body;
    const iris = document.getElementById('irisContainer');
    const form = document.getElementById('loginForm');
    const errorModal = document.getElementById('errorModal');
    const attemptsText = document.getElementById('attemptsText');

    let attempts = 0;
    const MAX_ATTEMPTS = 3;

    // --- IRIS INITIALIZATION ---
    if (sessionStorage.getItem('iris_initialized')) {
        body.classList.remove('not-initialized');
        body.classList.add('initialized');
        if(window.innerWidth <= 768) { iris.style.display = 'none'; }
    } else {
        sessionStorage.setItem('iris_initialized', 'true');
        if(window.innerWidth <= 768) {
            setTimeout(() => { 
                iris.classList.add('hide-completely');
                iris.style.display = 'none';
            }, 10000);
        }
    }

    // --- VISUAL ERROR FUNCTION ---
    function applyInputError(field, message) {
        const original = field.placeholder;
        field.placeholder = message;
        field.classList.add('input-error');
        setTimeout(() => { 
            field.classList.remove('input-error'); 
            field.placeholder = original; 
        }, 3000);
    }

    // --- LOGIN VALIDATION ---
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const userField = document.getElementById('userInput');
        const passField = document.getElementById('passInput');

        // 1. Check if empty
        if (!userField.value.trim() || !passField.value.trim()) {
            if (!userField.value.trim()) applyInputError(userField, "CAMPO OBRIGATÓRIO");
            if (!passField.value.trim()) applyInputError(passField, "CAMPO OBRIGATÓRIO");
            return; 
        }

        // 2. Check credentials
        if (userField.value === "Hudson" && passField.value === "@Huds$2781") {
            alert("Sincronização concluída.");
            attempts = 0;
        } else {
            attempts++;
            if (attemptsText) {
                attemptsText.innerText = `TENTATIVA ${attempts} DE ${MAX_ATTEMPTS}`;
            }
            errorModal.style.display = 'flex';
            
            if (attempts >= MAX_ATTEMPTS) {
                const btn = document.getElementById('authBtn');
                btn.disabled = true;
                btn.innerText = "SISTEMA BLOQUEADO";
                btn.style.opacity = "0.5";
            }
        }
    });

    function closeModals() {
        errorModal.style.display = 'none';
        form.reset();
    }
    
    </script>
</body>
</html>
